inputs:
  node-version:
    description: 'Node version to use'
    required: false

runs:
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        cache: pnpm
        node-version: ${{ inputs.node-version || 'lts/*' }}
    - shell: bash
      run: pnpm install --frozen-lockfile
  using: composite
